name: CI — Lint & Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install lint tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check --diff app/ src/
        continue-on-error: true

      - name: Check import ordering with isort
        run: isort --check-only --diff app/ src/
        continue-on-error: true

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 app/ src/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues
          flake8 app/ src/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

  dependency-audit:
    name: 🔒 Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969
        continue-on-error: true
